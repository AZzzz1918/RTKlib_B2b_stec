# RTKLIB-B2b real-time STEC configuration template
# Purpose:
#   Real-time PPP with STEC estimation for a user-owned receiver.
#   Receiver observations are read from input stream 1 (rover).
#   IGS real-time SSR corrections are read from input stream 3 (correction).
#
# Important:
#   Replace USER/PASS/CASTER/MOUNTPOINT placeholders before running.
#   If your receiver is connected by serial/TCP instead of NTRIP, edit strtype[0] and strpath[0].

PPP_Glo.RT_flag   =1    # 0=post-processing, 1=real-time.

# processing options
prcopt.mode       =7    # 7=PPP kinematic.
prcopt.navsys     =61   # 1 GPS + 4 GLO + 8 GAL + 16 QZS + 32 BDS = 61.
prcopt.sateph     =3    # 3=brdc+SSR APC for IGS RTS/APC SSR corrections. Use 4 if your SSR stream is COM-based.
prcopt.nf         =2    # Dual-frequency processing.
prcopt.elmin      =20.0 # Elevation cutoff in degrees. Lower this if too few satellites are available.

prcopt.snrmask_L1 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L2 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L5 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_r  =0
prcopt.snrmask_b  =0
prcopt.exclsats   =

# STEC estimation.
prcopt.ionoopt    =4    # 4=estimate STEC/slant ionosphere states.
prcopt.tropopt    =3    # 3=estimate ZTD.
prcopt.tidecorr   =1    # User receiver has no fixed BLQ by default: 1=solid tide only. Use 7 after generating matching BLQ.
prcopt.dynamics   =0

# PPP extension options.
# -ION_CONST=0 keeps external GIM/IONEX constraints disabled.
# -IONOPNOISE=1 uses random-walk ionosphere states.
# -GNSISB=1 estimates inter-system biases for multi-GNSS PPP.
prcopt.pppopt     =-ION_CONST=0 -IONOPNOISE=1 -ERATIO_GLO=100 -ERATIO_BDS=500 -ERATIO_GAL=100 -ERATIO_QZS=100 -GAMP_VARERR=1 -GAMP_GFCS=1 -GAMP_MWCS=1 -GAMP_LLICS=0 -GNSISB=1

prcopt.posopt[0]  =1    # Satellite antenna PCV.
prcopt.posopt[1]  =0    # Receiver antenna PCV off by default for a user receiver. Set 1 only if antenna type is known in ATX.
prcopt.posopt[2]  =1    # Phase wind-up.
prcopt.posopt[3]  =1    # Eclipse rejection.
prcopt.posopt[4]  =1    # RAIM/FDE.
prcopt.anttype[0] =*    # If posopt[1]=1, replace * with your antenna type or ensure the stream provides it.
prcopt.antdel[0][0] =0.00
prcopt.antdel[0][1] =0.00
prcopt.antdel[0][2] =0.00
prcopt.sp3sampling=30
prcopt.aroutcnt   =3

# solution output
solopt.posf       =0
solopt.outhead    =0
solopt.outopt     =0
solopt.outvel     =0
solopt.times      =0
solopt.timef      =1
solopt.timeu      =3
solopt.degform    =0
solopt.fieldsep   =
prcopt.outsingle  =0
solopt.maxsolstd  =0
solopt.height     =0
solopt.geoid      =0
solopt.solstatic  =0
solopt.nmeaintv1  =0
solopt.nmeaintv2  =0
solopt.outstat    =1    # 1=state output. Real-time STEC appears as $ION records in the status stream.
solopt.trace      =0

# external models
filopt.satantp = example\rtstec\igs20_2350.atx
filopt.rcvantp = example\rtstec\igs20_2350.atx
filopt.iono    =
filopt.dcb     =
filopt.blq     =        # Empty by default. Use example\rtstec\ocnload_241227.blq only if it contains your station.
filopt.eop     =
filopt.tempdir = example\rtstec\out
filopt.trace   = example\rtstec\out\rtstec_%Y_%m_%d.trace

# statistics/noise options
prcopt.eratio1    =100
prcopt.eratio2    =100
prcopt.eratio5    =100
prcopt.errphase   =0.003
prcopt.errphaseel =0.003
prcopt.errphasebl =0
prcopt.errdoppler =1
prcopt.snrmax     =52
prcopt.errsnr     =0
prcopt.errrcv     =0
prcopt.stdbias    =30
prcopt.stdiono    =0.03
prcopt.stdtrop    =0.3
prcopt.prnaccelh  =10
prcopt.prnaccelv  =10
prcopt.prnbias    =1.0e-07
prcopt.prniono    =4.0e-02
prcopt.prntrop    =1.0e-04
prcopt.prnpos     =0
prcopt.clkstab    =5e-12
prcopt.slipthres  =0.0
prcopt.dopthres   =0
prcopt.rejionno   =30
prcopt.rejcode    =30

# input stream
# Stream type: 0=off, 1=serial, 2=file, 3=tcpsvr, 4=tcpcli, 6=ntripcli, 7=ftp, 8=http.
# Format: 1=RTCM3, 4=UBX, 14/15=SP3/RINEX-style products, 20=Sino, 21=Unicore.
strtype[0]        =6
strfmt[0]         =1
strpath[0]        =USER:PASS@YOUR_RECEIVER_CASTER:2101/YOUR_RECEIVER_MOUNTPOINT
sta_name          =MYROVER

# Stream 2 is the base-station stream in RTKLIB/rtkrcv convention. It is not used for PPP.
strtype[1]        =0
strfmt[1]         =1
strpath[1]        =

strtype[2]        =6
strfmt[2]         =1
strpath[2]        =USER:PASS@YOUR_IGS_RTS_CASTER:2101/YOUR_IGS_SSR_MOUNTPOINT
navmsgsel         =0    # 0=all nav messages. Use 3 if navigation should be taken only from the correction stream.

# output stream
strtype[3]        =2
strfmt[3]         =0
strpath[3]        =example\rtstec\out\rtstec_%Y%m%d%h%M_MYROVER.pos::S=24

strtype[4]        =2
strfmt[4]         =4
strpath[4]        =example\rtstec\out\rtstec_%Y%m%d%h%M_MYROVER.stat::S=24

# log stream. Enable these only if you need to save raw input streams.
strtype[5]        =0
strtype[6]        =0
strtype[7]        =0
strpath[5]        =example\rtstec\out\receiver_%Y%m%d%h%M.rtcm3::T::S=24
strpath[6]        =
strpath[7]        =example\rtstec\out\igs_ssr_%Y%m%d%h%M.rtcm3::T::S=24

# misc option
svrcycle          =10
timeout           =10000
reconnect         =10000
nmeacycle         =5000
buffsize          =32768
