# RTKLIB-B2b postppp STEC 提取示例配置
# 来源：由 1/AU2022015_v/gamp.cfg 映射而来，用于后处理 PPP 并输出 .stec/.vtec。
# 重点：不使用 GIM/IONEX 外部电离层约束，直接在 PPP 中估计斜向电离层延迟 STEC。

PPP_Glo.RT_flag   =0    # 运行模式：0=后处理 POST，1=实时 RT。

# processing options
# 基本处理策略。
prcopt.mode       =7    # 定位模式：7=PPP kinematic，逐历元动态 PPP。
prcopt.navsys     =61   # 启用卫星系统位掩码：1 GPS + 4 GLO + 8 GAL + 16 QZS + 32 BDS = 61。
prcopt.sateph     =1    # 卫星星历/钟差来源：1=精密星历/精密钟差，配合下面的 SP3/CLK 输入文件。
prcopt.nf         =2    # 处理频点数：2=双频处理。
prcopt.elmin      =20.0 # 高度角截止角，单位度；低于 20 度的观测不参与解算。

# SNR 掩码，按高度角分段给出阈值。当前 L1/L2/L5 都为 38 dB-Hz。
prcopt.snrmask_L1 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L2 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L5 =38,38,38,38,38,38,38,38,38
prcopt.snrmask_r  =0    # 流动站/当前站 SNR 掩码开关：0=关闭。
prcopt.snrmask_b  =0    # 基准站 SNR 掩码开关：0=关闭；PPP 通常不使用基准站。
prcopt.exclsats   =     # 排除卫星列表，留空表示不手动排除；可填 G01、R05 等。

# 电离层、对流层和地球物理改正。
prcopt.ionoopt    =4    # 电离层处理：4=估计 STEC；这是生成 .stec 的核心设置。
prcopt.tropopt    =3    # 对流层处理：3=估计 ZTD。
prcopt.tidecorr   =7    # 潮汐改正：7=固体潮 + 海潮负荷 + 极潮。
prcopt.dynamics   =0    # 动力学模型：0=关闭，不使用速度/加速度动态约束。

# PPP 扩展选项，使用空格分隔。
# -ION_CONST=0  ：关闭 GIM/IONEX 电离层约束，STEC 由观测估计。
# -IONOPNOISE=1 ：电离层参数按随机游走模型处理。
# -ERATIO_*     ：按星座指定伪距/载波测量权比。
# -GAMP_VARERR=1：使用 GAMP 风格观测噪声模型。
# -GAMP_GFCS=1  ：启用 GF 组合周跳探测。
# -GAMP_MWCS=1  ：启用 MW 组合周跳探测。
# -GAMP_LLICS=0 ：关闭 LLI 周跳标志直接触发。
# -GNSISB=1     ：估计不同 GNSS 系统间偏差 ISB。
prcopt.pppopt     =-ION_CONST=0 -IONOPNOISE=1 -ERATIO_GLO=100 -ERATIO_BDS=500 -ERATIO_GAL=100 -ERATIO_QZS=100 -GAMP_VARERR=1 -GAMP_GFCS=1 -GAMP_MWCS=1 -GAMP_LLICS=0 -GNSISB=1

# 位置和天线相关改正。
prcopt.posopt[0]  =1    # 卫星天线相位中心改正 SatPCV：1=开启。
prcopt.posopt[1]  =1    # 接收机天线相位中心改正 RecPCV：1=开启。
prcopt.posopt[2]  =1    # 相位缠绕改正 Phase Wind-Up：1=开启。
prcopt.posopt[3]  =1    # 卫星食/eclipse 剔除：1=开启。
prcopt.posopt[4]  =1    # RAIM/FDE 异常观测剔除：1=开启。
prcopt.anttype[0] =*    # 接收机天线类型：*=从观测文件头读取。
prcopt.sp3sampling=30   # SP3 精密星历采样间隔，单位秒。
prcopt.aroutcnt   =3    # 模糊度/连续性相关的失锁容忍计数。

# solution output
# 主 .pos 文件的输出格式控制；.stec/.vtec 由后处理代码按 outfile 基名额外生成。
solopt.posf       =0    # 坐标格式：0=经纬高 LLH。
solopt.outhead    =0    # 是否输出文件头：0=不输出。
solopt.outopt     =0    # 是否输出配置选项：0=不输出。
solopt.outvel     =0    # 是否输出速度：0=不输出。
solopt.times      =0    # 时间系统：0=GPST。
solopt.timef      =1    # 时间格式：1=年月日时分秒。
solopt.timeu      =3    # 秒的小数位数：3=毫秒。
solopt.degform    =0    # 经纬度格式：0=十进制度。
solopt.fieldsep   =     # 输出字段分隔符，留空表示使用默认空格。
prcopt.outsingle  =0    # 是否输出单点定位结果：0=不输出。
solopt.maxsolstd  =0    # 最大解标准差限制；0 表示不额外限制。
solopt.height     =0    # 高程类型：0=椭球高。
solopt.geoid      =0    # 大地水准面模型：0=内部/默认。
solopt.solstatic  =0    # 静态解输出方式：0=输出所有历元；当前为 PPP 动态模式。
solopt.nmeaintv1  =0    # NMEA GGA 输出间隔，单位秒；0=不输出。
solopt.nmeaintv2  =0    # NMEA GSV 输出间隔，单位秒；0=不输出。
solopt.outstat    =0    # 状态/残差输出：0=关闭；只保留主要结果文件。
solopt.trace      =0    # trace 调试等级：0=关闭。

# input files
# infile0：观测文件；infile1：广播星历；infile2/3：跨日 SP3；infile4：精密钟差。
infile0 = 1\BDVL00AUS_R_20220150000_01D_30S_MO.22o
infile1 = 1\brdm0150.22p
infile2 = 1\igs21925.sp3
infile3 = 1\igs21926.SP3
infile4 = 1\igs21926.CLK

# output base path
# 后处理会以 outfile 为基名生成：
#   result\rtklib_b2b_no_gim.pos       主定位结果
#   result\rtklib_b2b_no_gim.pos.stec  斜向电离层 STEC
#   result\rtklib_b2b_no_gim.pos.vtec  垂向电离层 VTEC
outfile = result\rtklib_b2b_no_gim.pos

# external models
filopt.satantp = 1\igs14.atx    # 卫星天线相位中心模型 ATX。
filopt.rcvantp = 1\igs14.atx    # 接收机天线相位中心模型 ATX。
filopt.iono    =                # IONEX/GIM 文件路径；留空表示不加载外部电离层格网约束。
filopt.dcb     = 1\P1P22201.DCB;1\P1C12201.DCB;1\P2C22201.DCB;1\CAS0MGXRAP_20220150000_01D_01D_DCB.BSX # DCB/BSX 码偏差文件，多个文件用分号分隔。
filopt.blq     = 1\ocnload.blq  # 海潮负荷 BLQ 文件。
filopt.tempdir = result         # 临时文件和部分中间输出目录。

# statistics/noise options from gamp.cfg where RTKLIB-B2b has equivalent fields
# 观测噪声、过程噪声和粗差剔除阈值；这些值会直接影响 STEC 平滑程度和异常观测剔除。
prcopt.eratio1    =100      # L1/E1/B1 伪距/载波观测权比。
prcopt.eratio2    =100      # L2/E5/B2 伪距/载波观测权比。
prcopt.eratio5    =100      # L5/E5a/B2a 伪距/载波观测权比。
prcopt.errphase   =0.003    # 载波相位基础观测噪声，单位 m。
prcopt.errphaseel =0.003    # 与高度角相关的载波相位噪声项，单位 m。
prcopt.errphasebl =0        # 与基线长度相关的相位噪声项；PPP 中通常为 0。
prcopt.errdoppler =1        # 多普勒观测噪声，单位 Hz。
prcopt.snrmax     =52       # SNR 误差模型上限，单位 dB-Hz。
prcopt.errsnr     =0        # SNR 相关附加噪声项；0=不使用。
prcopt.errrcv     =0        # 接收机相关附加噪声项；0=不使用。
prcopt.stdbias    =30       # 初始模糊度标准差，单位 m。
prcopt.stdiono    =0.03     # 初始电离层参数标准差，单位 m。
prcopt.stdtrop    =0.3      # 初始对流层 ZTD 标准差，单位 m。
prcopt.prnaccelh  =10       # 水平加速度过程噪声，单位 m/s^2；动态模型关闭时影响有限。
prcopt.prnaccelv  =10       # 垂向加速度过程噪声，单位 m/s^2；动态模型关闭时影响有限。
prcopt.prnbias    =1.0e-07  # 模糊度参数过程噪声，单位 m/sqrt(s)。
prcopt.prniono    =4.0e-02  # 电离层 STEC 参数过程噪声，单位 m/sqrt(s)；越大表示允许变化越快。
prcopt.prntrop    =1.0e-04  # 对流层 ZTD 过程噪声，单位 m/sqrt(s)。
prcopt.prnpos     =0        # 位置参数过程噪声；0 表示不额外加随机游走。
prcopt.clkstab    =5e-12    # 接收机钟稳定度，单位 s/s。
prcopt.slipthres  =0.0      # 周跳检测阈值；0 表示使用配置/代码默认逻辑。
prcopt.dopthres   =0        # 多普勒粗差阈值；0=不额外启用该阈值。
prcopt.rejionno   =30       # 电离层相关残差剔除阈值，单位 m。
prcopt.rejcode    =30       # 伪距残差剔除阈值，单位 m。

